<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>web-rtl-433 &mdash; decode 433 MHz in the browser</title>
    <!-- Enables cross-origin isolation (SharedArrayBuffer) on hosts that can't
         set COOP/COEP headers, e.g. GitHub Pages. Reloads once on first visit. -->
    <script src="/coi-serviceworker.js"></script>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #171a21;
        --border: #272b35;
        --text: #e6e8ec;
        --muted: #8b909c;
        --accent: #4ade80;
        --accent-dim: #1f3d2c;
        --danger: #f87171;
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 14px/1.5 system-ui, -apple-system, sans-serif;
      }
      header {
        display: flex;
        align-items: baseline;
        gap: 12px;
        padding: 16px 20px;
        border-bottom: 1px solid var(--border);
      }
      header h1 { font-size: 16px; margin: 0; font-weight: 600; }
      header .sub { color: var(--muted); font-size: 12px; }
      header a { color: var(--accent); text-decoration: none; }
      main { padding: 20px; max-width: 1100px; margin: 0 auto; }
      .controls {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 12px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 16px;
      }
      .field { display: flex; flex-direction: column; gap: 4px; }
      .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
      input[type="number"], select {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        border-radius: 6px;
        padding: 8px 10px;
        font: 13px var(--mono);
        width: 130px;
      }
      select { width: 150px; cursor: pointer; }
      .check { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); cursor: pointer; }
      .check input { accent-color: var(--accent); }
      button {
        background: var(--accent);
        color: #06210f;
        border: none;
        border-radius: 6px;
        padding: 9px 16px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      button.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
      button:disabled { opacity: .4; cursor: not-allowed; }
      .status {
        display: inline-flex; align-items: center; gap: 7px;
        margin-left: auto; font-size: 13px; color: var(--muted);
      }
      .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); }
      .dot.on { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
      .dot.err { background: var(--danger); }
      .stats { display: flex; gap: 24px; margin: 18px 2px; color: var(--muted); font-size: 13px; }
      .stats b { color: var(--text); font-variant-numeric: tabular-nums; }
      table { width: 100%; border-collapse: collapse; margin-top: 8px; }
      th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
      th { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 500; }
      td { font: 13px var(--mono); vertical-align: top; }
      td.model { color: var(--accent); }
      tr.flash { animation: flash .8s ease-out; }
      @keyframes flash { from { background: var(--accent-dim); } to { background: transparent; } }
      .fields { color: var(--muted); }
      .fields span { color: var(--text); }
      .empty { color: var(--muted); padding: 40px; text-align: center; }
      .banner {
        background: #2a1d10; border: 1px solid #5a3d1a; color: #f0c98a;
        padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px;
      }
      #log {
        margin-top: 20px; max-height: 140px; overflow: auto;
        font: 11px var(--mono); color: var(--muted);
        background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 10px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>web-rtl-433</h1>
      <span class="sub">
        decode 433.92&nbsp;MHz ISM devices from an RTL-SDR &mdash; powered by
        <a href="https://github.com/merbanan/rtl_433" target="_blank" rel="noreferrer">rtl_433</a> in WebAssembly
      </span>
    </header>
    <main>
      <div id="unsupported" class="banner" hidden></div>
      <div class="controls">
        <div class="field">
          <label for="freq">Frequency (MHz)</label>
          <input id="freq" type="number" value="433.92" step="0.01" min="24" max="1766" />
        </div>
        <div class="field">
          <label for="rate">Sample rate (kHz)</label>
          <input id="rate" type="number" value="250" step="10" min="225" max="3200" />
        </div>
        <div class="field">
          <label for="gain">Tuner gain</label>
          <select id="gain">
            <option value="auto" selected>Auto (AGC)</option>
            <option value="49.6">49.6 dB (max)</option>
            <option value="44.5">44.5 dB</option>
            <option value="40.2">40.2 dB</option>
            <option value="33.8">33.8 dB</option>
            <option value="28.0">28.0 dB</option>
            <option value="22.9">22.9 dB</option>
            <option value="15.7">15.7 dB</option>
            <option value="8.7">8.7 dB</option>
          </select>
        </div>
        <label class="check" for="verbose" title="Run the pulse analyzer and noise reports to confirm signal is reaching the decoder">
          <input id="verbose" type="checkbox" /> Verbose (diagnostics)
        </label>
        <button id="connect">Connect SDR</button>
        <button id="stop" class="secondary" disabled>Stop</button>
        <button id="record" class="secondary" disabled title="Record ~6 s of raw IQ to a .cu8 file for offline diagnosis">Record 6s</button>
        <span class="status"><span id="dot" class="dot"></span><span id="statusText">Idle</span></span>
      </div>

      <div class="stats">
        <div>Events: <b id="count">0</b></div>
        <div>Unique devices: <b id="devices">0</b></div>
        <div>Dropped buffers: <b id="overflow">0</b></div>
      </div>

      <table>
        <thead>
          <tr><th style="width:120px">Received</th><th style="width:200px">Model</th><th style="width:90px">ID</th><th>Readings</th></tr>
        </thead>
        <tbody id="rows">
          <tr><td colspan="4" class="empty">No events yet. Connect an RTL-SDR and point a 433&nbsp;MHz sensor at it.</td></tr>
        </tbody>
      </table>

      <div id="log"></div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
